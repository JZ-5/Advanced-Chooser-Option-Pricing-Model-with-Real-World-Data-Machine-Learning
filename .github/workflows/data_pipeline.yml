name: Automated Quant Data Pipeline

on:
  schedule:
    # 每天 UTC 时间 22:00 运行（对应美东时间下午 6:00，刚好在美股收盘结算后）
    # 周一至周五滚动执行
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    # 支持在 GitHub 网页端手动点击触发，方便测试

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        # 持久化凭证，允许 Actions 把生成的数据 push 回代码仓库
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Pipeline
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
      run: |
        # 依次执行数据收集与特征矩阵衍生
        # 如果你已经把抓取和特征工程合并，只需执行对应的脚本
        python src/pipeline_daily.py

    - name: Commit and Push Processed Data
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions Bot"
        
        # 阶段化添加生成的最终特征矩阵文件
        git add data/processed/features_ann_final.csv
        
        # 检查文件是否有实际变动，如有变动则提交并推送到主分支
        git diff-index --quiet HEAD || (git commit -m "Automated pipeline update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" && git push)